<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Vlad Kalkatin @eIIka" />
    <meta name="description" content="Calculator practice site" />
    <title>Web Calculate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div>
        <h1>Calculate</h1>
    </div>
</header>

<div>
    <table id="calculate">
        <thead>
            <tr>
                <td colspan="3">
                    <input type="text" id="result" autocomplete="off" placeholder="Enter expression" />
                </td>
                <td>
                    <input type="button" value="c" onclick="clr()" />
                </td>
            </tr>
        </thead>
        <tbody>
<tr>
    <td><input type="button" value="1" onclick="element('1')" /></td>
    <td><input type="button" value="2" onclick="element('2')" /></td>
    <td><input type="button" value="3" onclick="element('3')" /></td>
    <td><input type="button" value="/" onclick="element('/')" /></td>
</tr>
<tr>
    <td><input type="button" value="4" onclick="element('4')" /></td>
    <td><input type="button" value="5" onclick="element('5')" /></td>
    <td><input type="button" value="6" onclick="element('6')" /></td>
    <td><input type="button" value="*" onclick="element('*')" /></td>
</tr>
<tr>
    <td><input type="button" value="7" onclick="element('7')" /></td>
    <td><input type="button" value="8" onclick="element('8')" /></td>
    <td><input type="button" value="9" onclick="element('9')" /></td>
    <td><input type="button" value="-" onclick="element('-')" /></td>
</tr>
<tr>
    <td><input type="button" value="0" onclick="element('0')" /></td>
    <td><input type="button" value="." onclick="element('.')" /></td>
    <td><input type="button" value="=" onclick="res()" /></td>
    <td><input type="button" value="+" onclick="element('+')" /></td>
</tr>
</tbody>
    </table>
</div>

<footer>
    <details>
        <summary>Author</summary>
        <p>Vlad Kalkatin</p>
        <p><a href="https://github.com/eIIka" target="_blank" rel="noopener noreferrer">GitHub</a></p>
    </details>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.5.0/math.min.js"></script>
<script src="script.js"></script>
</body>
</html>
